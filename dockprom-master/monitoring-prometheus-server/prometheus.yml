global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'myministcloud'

rule_files:
  - "alert.rules"

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    scrape_interval: 10s
    static_configs:
      - targets: ['localhost:9090']

  # Phase 2 - Requirement 7: Monitor web frontend
  - job_name: 'web'
    scrape_interval: 10s
    metrics_path: /metrics
    static_configs:
      - targets: ['web-1-exporter:9113']
        labels:
          instance: 'web-1:80'
      - targets: ['web-2-exporter:9113']
        labels:
          instance: 'web-2:80'

  # Monitor application backend
  - job_name: 'app'
    scrape_interval: 10s
    metrics_path: /health
    static_configs:
      - targets: ['application-backend-server:5000']

alerting:
  alertmanagers:
    - static_configs:
        - targets: []
