events {
    worker_connections 1024;
}

http {
    # Phase 2 - Requirement 10: Load Balancer
    upstream web_cluster {
        server web-1:80;
        server web-2:80;
    }

    server {
        listen 80;

        # Phase 1: Route / -> web frontend (load balanced in Phase 2)
        location / {
            proxy_pass http://web_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Phase 1: Route /api -> application backend
        location /api/ {
            proxy_pass http://application-backend-server:5000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Phase 1: Route /auth -> Keycloak
        location /auth/ {
            proxy_pass http://authentication-identity-server:8080/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;
        }

        # Phase 2 - Requirement 9: Route /student/
        location /student/ {
            proxy_pass http://application-backend-server:5000/student;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Nginx stub_status for monitoring
        location /nginx_status {
            stub_status on;
            access_log off;
        }
    }
}
